name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '{GO_VERSION}'
  NODE_VERSION: '{NODE_VERSION}'

jobs:
  # ============================================
  # STAGE 1: Checking
  # ============================================
  checking:
    name: đź”Ť Checking
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify backend version file
        run: |
          CONFIG_VERSION=$(grep '"version"' {BACKEND_DIR}/{VERSION_FILE} | sed 's/.*"version": "\([^"]*\)".*/\1/')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"

          echo "Config version: $CONFIG_VERSION"
          echo "Tag version: $TAG_VERSION"

          if [ "$CONFIG_VERSION" != "$TAG_VERSION" ]; then
            echo "âťŚ ERROR: {VERSION_FILE} version ($CONFIG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "âś… {VERSION_FILE} version matches"

      - name: Verify frontend version
        run: |
          PACKAGE_VERSION=$(grep '"version"' {FRONTEND_DIR}/package.json | sed 's/.*"version": "\([^"]*\)".*/\1/')
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"

          echo "Package version: $PACKAGE_VERSION"
          echo "Tag version: $TAG_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "âťŚ ERROR: package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "âś… package.json version matches"

      - name: Version check summary
        run: |
          echo "=========================================="
          echo "âś… All version checks passed!"
          echo "   Release version: v${{ steps.version.outputs.VERSION }}"
          echo "=========================================="

  # ============================================
  # STAGE 2: Compiling (parallel builds)
  # ============================================
  compiling:
    name: đź”¨ Compile ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: checking

    strategy:
      matrix:
        include:
          - target: Windows
            goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - target: Linux ARM64
            goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: {FRONTEND_DIR}/package-lock.json

      - name: Install frontend dependencies
        working-directory: {FRONTEND_DIR}
        run: npm ci

      - name: Build frontend
        working-directory: {FRONTEND_DIR}
        run: npm run build

      - name: Copy dist for embedding
        run: |
          rm -rf {BACKEND_DIR}/{EMBED_DIR}
          cp -r {FRONTEND_DIR}/dist {BACKEND_DIR}/{EMBED_DIR}

      - name: Build ${{ matrix.target }}
        working-directory: {BACKEND_DIR}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          echo "Building ${{ matrix.target }}..."
          go build -ldflags="-s -w" -o ../{BINARY_NAME}-v${{ needs.checking.outputs.version }}-${{ matrix.suffix }} {GO_MAIN_PKG}
          echo "âś… ${{ matrix.target }} build complete"

      - name: Validate binary
        run: |
          FILE="{BINARY_NAME}-v${{ needs.checking.outputs.version }}-${{ matrix.suffix }}"
          SIZE=$(stat -c%s "$FILE")
          echo "${{ matrix.target }} binary: $SIZE bytes ($(numfmt --to=iec $SIZE))"

          MIN_SIZE={MIN_BINARY_SIZE}
          if [ "$SIZE" -lt "$MIN_SIZE" ]; then
            echo "âťŚ ERROR: Binary too small ($SIZE < $MIN_SIZE)"
            exit 1
          fi
          echo "âś… ${{ matrix.target }} binary validation passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: {BINARY_NAME}-v${{ needs.checking.outputs.version }}-${{ matrix.suffix }}
          retention-days: 1

  # ============================================
  # STAGE 3: Releasing
  # ============================================
  releasing:
    name: đźš€ Releasing
    runs-on: ubuntu-latest
    needs: [checking, compiling]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lh artifacts/

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ needs.checking.outputs.version }}"

          echo "Extracting release notes for v$VERSION from CHANGELOG.md..."

          NOTES=$(awk "/## \[$VERSION\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
            echo "âš ď¸Ź No release notes found in CHANGELOG.md, using default"
          else
            echo "âś… Release notes extracted"
          fi

          echo "$NOTES" > release_notes.md
          echo "--- Release Notes ---"
          cat release_notes.md
          echo "---------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: {PROJECT_NAME} v${{ needs.checking.outputs.version }}
          body_path: release_notes.md
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "=========================================="
          echo "đźŽ‰ Release v${{ needs.checking.outputs.version }} published!"
          echo ""
          echo "đź“¦ Assets:"
          ls -1 artifacts/
          echo ""
          echo "đź”— https://github.com/${{ github.repository }}/releases/tag/v${{ needs.checking.outputs.version }}"
          echo "=========================================="
