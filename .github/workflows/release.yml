# Workflow du repo template — cree une GitHub Release a chaque tag vX.Y.Z
#
# Ce fichier est propre au repo CCoupel/claude_project_template.
# Les templates de workflows pour les projets utilisateurs sont dans :
#   .claude/templates/workflows/release-go-react.yml
#
# Pour generer le workflow d'un projet : /init-project → etape CI/CD

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "claude_project_template ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
